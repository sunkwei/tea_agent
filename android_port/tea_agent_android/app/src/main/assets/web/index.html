<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TeaAgent</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ====== 侧边栏：主题列表 ====== -->
<div id="sidebar">
    <div id="sidebar-header">
        <span>🍵 TeaAgent</span>
        <button id="btn-new-topic" title="新对话">＋</button>
    </div>
    <div id="topic-list"></div>
    <div id="sidebar-footer">
        <button id="btn-settings-sidebar">⚙️ 设置</button>
    </div>
</div>

<!-- ====== 主区域 ====== -->
<div id="main-area">
    <!-- 顶栏 -->
    <header id="top-bar">
        <button id="btn-toggle-sidebar">☰</button>
        <span id="current-topic-title">新对话</span>
        <div id="top-info">
            <span id="token-stats" title="Token 统计">🪙 0</span>
        </div>
    </header>

    <!-- 聊天区 -->
    <main id="chat-container">
        <div id="chat-messages">
            <div class="msg-system">
                <div class="msg-content">
                    <p>👋 <strong>TeaAgent Android</strong> v0.2.0</p>
                    <p>⚙️ 请先配置 API，然后开始对话</p>
                </div>
            </div>
        </div>
        <button id="btn-scroll-bottom">↓</button>
    </main>

    <!-- 输入区 -->
    <footer id="input-area">
        <div id="input-row">
            <button id="btn-stop" style="display:none">⏹</button>
            <textarea id="user-input" rows="1" placeholder="输入消息..."></textarea>
            <button id="btn-send">➤</button>
        </div>
        <div id="input-options">
            <label class="option"><input type="checkbox" id="opt-tools" checked> 🔧</label>
            <label class="option"><input type="checkbox" id="opt-thinking"> 🧠</label>
            <span id="status">● 就绪</span>
        </div>
    </footer>
</div>

<!-- ====== 设置弹窗 ====== -->
<div id="settings-overlay" style="display:none">
    <div id="settings-panel">
        <h3>⚙️ 设置</h3>
        <div class="tab-bar">
            <button class="tab active" data-tab="main">主模型</button>
            <button class="tab" data-tab="cheap">便宜模型</button>
            <button class="tab" data-tab="embedding">嵌入模型</button>
            <button class="tab" data-tab="general">通用</button>
        </div>

        <div class="tab-content active" id="tab-main">
            <label>API 地址</label>
            <input type="text" id="cfg-main-url" placeholder="http://10.0.2.2:11434/v1">
            <label>API Key</label>
            <input type="password" id="cfg-main-key" placeholder="sk-...">
            <label>模型名称</label>
            <input type="text" id="cfg-main-model" placeholder="qwen3.6">
            <label>Max Tokens</label>
            <input type="number" id="cfg-main-max-tokens" value="4096">
        </div>

        <div class="tab-content" id="tab-cheap">
            <label>API 地址</label>
            <input type="text" id="cfg-cheap-url" placeholder="http://10.0.2.2:11434/v1">
            <label>API Key</label>
            <input type="password" id="cfg-cheap-key">
            <label>模型名称</label>
            <input type="text" id="cfg-cheap-model">
        </div>

        <div class="tab-content" id="tab-embedding">
            <label>API 地址</label>
            <input type="text" id="cfg-emb-url">
            <label>API Key</label>
            <input type="password" id="cfg-emb-key">
            <label>模型名称</label>
            <input type="text" id="cfg-emb-model">
        </div>

        <div class="tab-content" id="tab-general">
            <label>保留轮数 (keep_turns)</label>
            <input type="number" id="cfg-keep-turns" value="5" min="1" max="50">
            <label>最大工具迭代</label>
            <input type="number" id="cfg-max-iter" value="30" min="1" max="100">
            <label>主题</label>
            <select id="cfg-theme">
                <option value="dark">深色</option>
                <option value="light">浅色</option>
            </select>
        </div>

        <div class="settings-actions">
            <button id="btn-save-config">💾 保存</button>
            <button id="btn-close-settings">关闭</button>
        </div>
    </div>
</div>

<!-- ====== 工具详情弹窗 ====== -->
<div id="tool-detail-overlay" style="display:none">
    <div id="tool-detail-panel">
        <h3>🔧 工具调用详情</h3>
        <pre id="tool-detail-content"></pre>
        <button id="btn-close-tool-detail">关闭</button>
    </div>
</div>

<script src="lib/marked.min.js"></script>
<script src="js/bridge.js"></script>
<script src="js/app.js"></script>
</body>
</html>
