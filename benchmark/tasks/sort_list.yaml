# 基准任务：写排序函数
name: "写排序函数"
description: "用 Python 实现快速排序，中等复杂度"
category: "代码生成"
prompt: "用 Python 写一个快速排序函数 quick_sort(arr)，包含类型注解和 docstring"
runs: 5
fair_mode: true
expected_patterns:
  - "def quick_sort"
  - "List"  # 或 "list[" 类型注解
  - "pivot"  # 快排特征
  - "\"\"\""  # docstring
tool_allowlist: []
