<title>DAG 工作流 — Tea Agent</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* 顶部栏 */
.topbar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
}
.topbar h1 { font-size: 18px; font-weight: 600; color: #58a6ff; }
.topbar .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 500;
}
.badge-running { background: #1f6feb33; color: #58a6ff; border: 1px solid #1f6feb66; }

/* 主布局 */
.main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
}

/* 侧边栏 — 模拟任务面板 */
.task-panel {
    width: 320px;
    min-width: 260px;
    background: #161b22;
    border-right: 1px solid #30363d;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
}
.task-panel h3 {
    font-size: 13px;
    text-transform: uppercase;
    color: #8b949e;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
}

/* DAG 卡片（任务面板中） */
.dag-card {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
}
.dag-card:hover { border-color: #58a6ff; }
.dag-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid #21262d;
    font-size: 13px;
    font-weight: 600;
}
.dag-card-header .icon { font-size: 18px; }
.dag-card-img {
    width: 100%;
    display: block;
    background: #0d1117;
}

/* 进度信息 */
.dag-progress {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #8b949e;
}
.dag-progress .bar {
    flex: 1;
    height: 4px;
    background: #21262d;
    border-radius: 2px;
    overflow: hidden;
}
.dag-progress .bar-fill {
    height: 100%;
    background: #3fb950;
    border-radius: 2px;
    transition: width 0.3s;
}

/* SVG 查看器 */
.svg-viewer {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: #0d1117;
    overflow: auto;
}
.svg-viewer svg {
    max-width: 100%;
    max-height: 100%;
}

/* 图例 */
.legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    padding: 10px 14px;
    border-top: 1px solid #21262d;
    font-size: 11px;
    color: #8b949e;
}
.legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
}
.legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    display: inline-block;
}

/* 状态标签 */
.status-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 6px;
}

/* 响应式 */
@media (max-width: 768px) {
    .main-layout { flex-direction: column; }
    .task-panel { width: 100%; border-right: none; border-bottom: 1px solid #30363d; }
}
</style>
