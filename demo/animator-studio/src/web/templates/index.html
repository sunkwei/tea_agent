<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animator Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#0a0a0a;color:#fff;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.container{text-align:center;max-width:680px;padding:40px 20px}
.logo{font-size:64px;margin-bottom:16px}
h1{font-size:clamp(28px,5vw,48px);font-weight:bold;
  background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcbff,#a66cff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
p{color:rgba(255,255,255,0.5);font-size:18px;margin-bottom:40px;line-height:1.6}
.btn-group{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.btn{padding:14px 32px;border:1px solid rgba(255,255,255,0.2);border-radius:12px;
  background:rgba(255,255,255,0.06);color:#fff;font-size:16px;cursor:pointer;
  text-decoration:none;transition:all 0.3s}
.btn:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.4);
  transform:translateY(-2px)}
.btn-primary{background:linear-gradient(135deg,#6bcbff,#a66cff);border:none;color:#fff}
.btn-primary:hover{opacity:0.9;transform:translateY(-2px)}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;margin:40px 0;width:100%;text-align:left}
.feature{padding:20px;border-radius:12px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06)}
.feature h3{font-size:16px;margin-bottom:8px;color:#8ab4f8}
.feature p{font-size:13px;color:rgba(255,255,255,0.4);margin:0}
.footer{margin-top:40px;color:rgba(255,255,255,0.2);font-size:13px}
</style>
</head>
<body>
<div class="container">
  <div class="logo">🎬</div>
  <h1>Animator Studio</h1>
  <p>从文字描述到动画视频<br>零代码 · 零门槛 · 支持语音旁白</p>
  <div class="btn-group">
    <a href="/studio" class="btn btn-primary">🎨 工作室</a>
    <a href="/docs" class="btn">📖 API 文档</a>
  </div>
  <div class="features">
    <div class="feature">
      <h3>📝 文字→动画</h3>
      <p>输入描述，AI 自动生成 Canvas 动画</p>
    </div>
    <div class="feature">
      <h3>🔊 语音旁白</h3>
      <p>Web Speech API 自动朗读场景说明</p>
    </div>
    <div class="feature">
      <h3>🎞️ 录制 MP4</h3>
      <p>Playwright + ffmpeg 高清录制</p>
    </div>
    <div class="feature">
      <h3>📱 手机进化史</h3>
      <p>5 款卡通拟人化手机故事动画</p>
    </div>
  </div>
  <div class="footer">Powered by animator engine</div>
</div>
</body>
</html>
