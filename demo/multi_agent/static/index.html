<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Agent 辩论赛</title>
<style>
:root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
    --text: #c9d1d9; --text-dim: #8b949e; --border: #30363d;
    --blue: #58a6ff; --blue-bg: rgba(88,166,255,0.08);
    --red: #f85149; --red-bg: rgba(248,81,73,0.08);
    --green: #3fb950; --gold: #e3b341;
    --radius: 10px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
.header { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; gap:16px; flex-shrink:0; }
.header h1 { font-size:18px; color:var(--gold); }
.header .subtitle { font-size:12px; color:var(--text-dim); }
.control-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; flex-shrink:0; }
.control-bar label { font-size:13px; color:var(--text-dim); white-space:nowrap; }
.control-bar select, .control-bar input { background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:6px 10px; font-size:13px; font-family:var(--font); }
.control-bar select { min-width:180px; }
.control-bar input[type=text] { flex:1; min-width:200px; }
.btn { background:var(--green); color:#fff; border:none; border-radius:6px; padding:8px 24px; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.15s; }
.btn:hover { opacity:0.9; }
.btn:disabled { opacity:0.4; cursor:not-allowed; }
.btn.stop { background:var(--red); display:none; }
.progress-bar-wrap { height:3px; background:var(--surface2); flex-shrink:0; }
.progress-bar-inner { height:100%; background:var(--blue); width:0%; transition:width 0.3s; }
.panels { display:flex; flex:1; overflow:hidden; }
.panel { flex:1; display:flex; flex-direction:column; overflow:hidden; border-right:1px solid var(--border); }
.panel:last-child { border-right:none; }
.panel-header { padding:8px 16px; font-size:14px; font-weight:600; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-shrink:0; }
.panel-header .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.panel.left .panel-header { background:var(--blue-bg); }
.panel.left .dot { background:var(--blue); }
.panel.right .panel-header { background:var(--red-bg); }
.panel.right .dot { background:var(--red); }
.panel-body { flex:1; overflow-y:auto; padding:12px; }
.round-card { margin-bottom:12px; padding:12px 14px; border-radius:var(--radius); border:1px solid var(--border); animation:slideIn 0.3s ease; line-height:1.7; font-size:14px; white-space:pre-wrap; word-break:break-word; }
@keyframes slideIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
.round-card.left-card { background:var(--blue-bg); border-left:3px solid var(--blue); margin-right:8px; }
.round-card.right-card { background:var(--red-bg); border-left:3px solid var(--red); margin-left:8px; }
.round-card .round-label { font-size:11px; font-weight:600; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.round-card .round-num { background:var(--surface2); border-radius:10px; padding:1px 8px; font-size:10px; }
.typing-indicator { padding:12px 14px; display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-dim); }
.typing-dots span { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--text-dim); margin:0 2px; animation:typingBounce 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay:0.15s; }
.typing-dots span:nth-child(3) { animation-delay:0.3s; }
@keyframes typingBounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }
.toast { position:fixed; top:16px; left:50%; transform:translateX(-50%); background:var(--surface2); color:var(--text); padding:10px 24px; border-radius:8px; font-size:14px; z-index:999; opacity:0; transition:opacity 0.3s; pointer-events:none; border:1px solid var(--border); }
.toast.show { opacity:1; }
.toast.error { border-color:var(--red); color:var(--red); }
.toast.success { border-color:var(--green); color:var(--green); }
.summary-bar { background:var(--surface); border-top:1px solid var(--border); padding:8px 20px; font-size:13px; color:var(--text-dim); display:none; flex-shrink:0; }
</style>
</head>
<body>
<div class="header"><h1>⚔️ Multi-Agent 辩论赛</h1><span class="subtitle">双 AI 对抗 · 50轮辩论</span></div>
<div class="control-bar">
    <label>🔵 甲方:</label><select id="left-config"></select>
    <label>🔴 乙方:</label><select id="right-config"></select>
    <input type="text" id="topic-input" placeholder="输入辩论主题，如：Python 是否应该使用类型注解？">
    <button class="btn" id="start-btn" onclick="startDebate()">▶ 开始辩论</button>
    <button class="btn stop" id="stop-btn" onclick="stopDebate()">⏹ 停止</button>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-inner" id="progress-bar"></div></div>
<div class="panels">
    <div class="panel left">
        <div class="panel-header"><span class="dot"></span> 🔵 甲方 <span style="font-size:11px;color:var(--text-dim);font-weight:400" id="left-model-name"></span></div>
        <div class="panel-body" id="left-panel"><div style="text-align:center;padding:60px 20px;color:var(--text-dim)"><div style="font-size:48px;margin-bottom:16px">🔵</div><div>等待辩论开始…</div></div></div>
    </div>
    <div class="panel right">
        <div class="panel-header"><span class="dot"></span> 🔴 乙方 <span style="font-size:11px;color:var(--text-dim);font-weight:400" id="right-model-name"></span></div>
        <div class="panel-body" id="right-panel"><div style="text-align:center;padding:60px 20px;color:var(--text-dim)"><div style="font-size:48px;margin-bottom:16px">🔴</div><div>等待辩论开始…</div></div></div>
    </div>
</div>
<div class="summary-bar" id="summary-bar"></div>
<div class="toast" id="toast"></div>
<script>
'use strict';
const MAX_ROUNDS = 50;
let isRunning = false, currentTyping = null;
const $ = id => document.getElementById(id);
const esc = t => { const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; };
function toast(m,t) { const e=$('toast'); e.textContent=m; e.className='toast show '+(t||''); setTimeout(()=>e.classList.remove('show'),3000); }

async function loadConfigs() {
    try {
        const r = await fetch('/api/configs'), d = await r.json();
        const cfgs = d.configs || [];
        let html = ''; cfgs.forEach(c => html += `<option value="${esc(c.path)}">${esc(c.filename)} — ${esc(c.model)}</option>`);
        $('left-config').innerHTML = html; $('right-config').innerHTML = html;
        if (cfgs.length >= 2) { $('left-config').selectedIndex = 0; $('right-config').selectedIndex = 1; }
    } catch(e) { toast('加载配置失败: '+e.message,'error'); }
}

window.startDebate = async function() {
    if (isRunning) return;
    const topic = $('topic-input').value.trim();
    if (!topic) { toast('请输入辩论主题','error'); return; }
    isRunning = true; $('start-btn').disabled=true; $('stop-btn').style.display='';
    $('progress-bar').style.width='0%'; $('left-panel').innerHTML=''; $('right-panel').innerHTML=''; $('summary-bar').style.display='none';
    const lf=$('left-config').selectedOptions[0], rf=$('right-config').selectedOptions[0];
    $('left-model-name').textContent = lf?lf.textContent.split(' — ')[1]||'':''; $('right-model-name').textContent = rf?rf.textContent.split(' — ')[1]||'':'';
    try {
        const res=await fetch('/api/debate/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic,left_config:$('left-config').value,right_config:$('right-config').value})});
        if(!res.ok){const e=await res.json();throw new Error(e.error);}
        const reader=res.body.getReader(), decoder=new TextDecoder(); let buf='';
        while(true){const{value,done}=await reader.read();if(done)break;buf+=decoder.decode(value,{stream:true});const lines=buf.split('\n');for(let i=0;i<lines.length-1;i++){const line=lines[i].trim();if(!line.startsWith('data: '))continue;try{handleEvent(JSON.parse(line.slice(6)))}catch(e){}}buf=lines[lines.length-1];}
    } catch(e) { toast('辩论出错: '+e.message,'error'); }
    finally { isRunning=false; $('start-btn').disabled=false; $('stop-btn').style.display='none'; }
};

window.stopDebate = async function() {
    try { await fetch('/api/debate/cancel',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({debate_id:''})}); } catch(e){}
};

function removeTyping() { if(currentTyping&&currentTyping.parentNode){currentTyping.remove();} currentTyping=null; }

function handleEvent(data) {
    switch(data.type) {
        case 'round_start':
            removeTyping();
            $('progress-bar').style.width = ((data.round/MAX_ROUNDS)*100)+'%';
            const pid = data.speaker==='left'?'left-panel':'right-panel';
            const ind = document.createElement('div');
            ind.className='typing-indicator';
            ind.innerHTML = '<span>'+esc(data.label)+'</span><span class="typing-dots"><span></span><span></span><span></span></span>';
            $(pid).appendChild(ind); currentTyping=ind;
            ind.scrollIntoView({behavior:'smooth'});
            break;
        case 'round_done':
            removeTyping();
            $('progress-bar').style.width = ((data.round/MAX_ROUNDS)*100)+'%';
            const cid = data.speaker==='left'?'left-panel':'right-panel';
            const cls = data.speaker==='left'?'round-card left-card':'round-card right-card';
            const lbl = data.speaker==='left'?'🔵 甲方':'🔴 乙方';
            const card = document.createElement('div');
            card.className = cls;
            card.innerHTML = '<div class="round-label"><span>'+lbl+'</span><span class="round-num">第'+data.round+'轮</span></div><div>'+esc(data.text)+'</div>';
            $(cid).appendChild(card); card.scrollIntoView({behavior:'smooth'});
            break;
        case 'debate_done':
            removeTyping(); $('progress-bar').style.width='100%';
            $('summary-bar').style.display='flex';
            $('summary-bar').innerHTML = '✅ 辩论结束！共 '+data.total_rounds+' 轮';
            toast('辩论完成！共 '+data.total_rounds+' 轮','success');
            break;
        case 'error':
            removeTyping(); toast('错误: '+data.error,'error');
            break;
    }
}
loadConfigs();
</script>
</body>
</html>
