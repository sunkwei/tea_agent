# Tea Agent — Nginx Reverse Proxy Config
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/tea-agent
#          sudo ln -s /etc/nginx/sites-available/tea-agent /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream tea-agent-backend {
    server 127.0.0.1:8081;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name tea-agent.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tea-agent.example.com;

    # SSL — configure with certbot or your certificate
    ssl_certificate     /etc/letsencrypt/live/tea-agent.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tea-agent.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Max upload size (for images)
    client_max_body_size 50M;

    # Proxy to Tea Agent
    location / {
        proxy_pass http://tea-agent-backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support — don't buffer streaming responses
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    3600s;  # Long timeout for streaming
    }

    # Static files cache
    location /static/ {
        proxy_pass http://tea-agent-backend;
        proxy_cache_valid 200 1h;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health {
        proxy_pass http://tea-agent-backend;
        access_log off;
    }
}
