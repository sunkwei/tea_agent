# Tea Agent — Docker Compose
#
# Usage:
#   docker compose up -d          # Start
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop
#
# Access: http://localhost:8081

version: "3.8"

services:
  tea-agent:
    build: .
    container_name: tea-agent
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      # Persist config and database
      - tea_agent_data:/root/.tea_agent
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  tea_agent_data:
