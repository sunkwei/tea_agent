<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tea Agent Canvas</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 顶部栏 */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    -webkit-app-region: drag;
  }
  .toolbar-title {
    font-weight: 600;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .toolbar-title .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }
  .toolbar-actions {
    display: flex;
    gap: 0.5rem;
    -webkit-app-region: no-drag;
  }
  .toolbar-actions button {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.3rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
  }
  .toolbar-actions button:hover {
    background: #21262d;
    border-color: var(--accent);
  }

  /* 主面板 */
  .main-panel {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* 侧边栏 - 内容列表 */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 0.8rem;
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.4rem;
  }
  .sidebar-item {
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--text-dim);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 2px;
  }
  .sidebar-item:hover {
    background: #21262d;
    color: var(--text);
  }
  .sidebar-item.active {
    background: #1f6feb33;
    color: var(--accent);
    border: 1px solid #1f6feb44;
  }
  .sidebar-item .icon {
    font-size: 1rem;
    width: 20px;
    text-align: center;
  }

  /* 内容区域 */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .content-header {
    padding: 0.6rem 1rem;
    font-size: 0.8rem;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    justify-content: space-between;
  }
  .content-frame {
    flex: 1;
    border: none;
    background: white;
  }
  .content-frame.dark {
    background: #0d1117;
  }

  /* 状态栏 */
  .statusbar {
    padding: 0.3rem 1rem;
    font-size: 0.75rem;
    color: var(--text-dim);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }

  /* 空状态 */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    gap: 1rem;
  }
  .empty-state .big-icon {
    font-size: 4rem;
    opacity: 0.3;
  }
  .empty-state h2 {
    font-weight: 400;
    font-size: 1.2rem;
  }
  .empty-state p {
    font-size: 0.85rem;
    max-width: 400px;
    text-align: center;
    line-height: 1.6;
  }

  /* A2UI 输入面板 */
  .a2ui-panel {
    display: none;
    padding: 1rem;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  .a2ui-panel.open {
    display: block;
  }
  .a2ui-panel textarea {
    width: 100%;
    height: 150px;
    background: #0d1117;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    resize: vertical;
  }
  .a2ui-panel .a2ui-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }
  .a2ui-panel .a2ui-actions button {
    background: #238636;
    color: white;
    border: none;
    padding: 0.4rem 1.2rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<!-- 工具栏 -->
<div class="toolbar">
  <div class="toolbar-title">
    <span class="dot"></span>
    🦞 Tea Agent Canvas
  </div>
  <div class="toolbar-actions">
    <button onclick="refreshCanvas()">🔄 刷新</button>
    <button onclick="toggleA2UI()">📐 A2UI</button>
    <button onclick="toggleTheme()">🌓 主题</button>
    <button onclick="openInNewTab()">↗️ 新标签</button>
  </div>
</div>

<!-- 主面板 -->
<div class="main-panel">
  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-header">📄 Canvas 页面</div>
    <div class="sidebar-list" id="fileList">
      <div class="empty-state" style="padding:1rem;font-size:0.8rem">
        等待 Agent 推送内容...
      </div>
    </div>
  </div>

  <!-- 内容 -->
  <div class="content">
    <div class="content-header">
      <span id="currentFile">~/index.html</span>
      <span id="fileInfo">就绪</span>
    </div>
    <div id="contentArea" class="empty-state">
      <div class="big-icon">🦞</div>
      <h2>Canvas 空白的</h2>
      <p>
        Agent 可以通过 <strong>Canvas API</strong> 或 <strong>A2UI 协议</strong>
        将内容渲染到这里。<br>
        这是 Agent 的可视化工作区 — 图表、仪表盘、交互界面...
      </p>
    </div>
    <iframe id="canvasFrame" class="content-frame dark" style="display:none"></iframe>

    <!-- A2UI 输入 -->
    <div class="a2ui-panel" id="a2uiPanel">
      <textarea id="a2uiInput" placeholder='粘贴 A2UI JSON 组件...&#10;示例: {"surface":"main","components":[{"id":"hello","component":{"Text":{"text":"Hello Canvas!","usageHint":"h1"}}}]}'></textarea>
      <div class="a2ui-actions">
        <button onclick="pushA2UI()">▶ 推送渲染</button>
        <button onclick="document.getElementById('a2uiInput').value=exampleA2UI()">📋 示例</button>
      </div>
    </div>
  </div>
</div>

<!-- 状态栏 -->
<div class="statusbar">
  <span id="statusLeft">🟢 Gateway 已连接</span>
  <span id="statusRight">WS: -- | 文件: --</span>
</div>

<script>
// ── 状态 ──
let WS = null;
let files = [];
let currentTheme = 'dark';

// ── WebSocket 连接 ──
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  WS = new WebSocket(proto + '//' + location.host + '/ws');
  WS.onopen = () => {
    document.getElementById('statusLeft').textContent = '🟢 Gateway 已连接';
    loadFileList();
  };
  WS.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'canvas_update') {
        loadFileList();
        if (msg.path) selectFile(msg.path);
      } else if (msg.type === 'pong') { /* ok */ }
    } catch(_) {}
  };
  WS.onclose = () => {
    document.getElementById('statusLeft').textContent = '🔴 Gateway 已断开，5s 后重连...';
    setTimeout(connectWS, 5000);
  };
  WS.onerror = () => WS.close();
}

// ── 文件列表 ──
async function loadFileList() {
  try {
    const resp = await fetch('/canvas/api/snapshot');
    // 简单做法：扫描 Canvas 目录（通过 /canvas/ 列出）
    const list = document.getElementById('fileList');
    list.innerHTML = '<div class="sidebar-header">📄 Canvas 页面</div>';
    // 从服务器获取文件列表
    const filesResp = await fetch('/health');
    // 由于没有专门的 list API，用硬编码列表 + 动态发现
    // 改为扫描 index.html 等已知文件
    refreshFileList();
  } catch(e) {
    console.warn('File list error:', e);
  }
}

async function refreshFileList() {
  // 尝试常见路径
  const candidates = ['index.html'];
  // 先确保 index.html 存在
  const list = document.getElementById('fileList');
  list.innerHTML = '<div class="sidebar-header">📄 Canvas 页面</div>';

  try {
    const resp = await fetch('/canvas/');
    // 如果能获取到目录列表...
  } catch(e) {}

  // 添加默认项
  addFileItem('🏠', 'index.html', true);
  addFileItem('📐', '_a2ui_main.html', false);
}

function addFileItem(icon, name, active) {
  const list = document.getElementById('fileList');
  const div = document.createElement('div');
  div.className = 'sidebar-item' + (active ? ' active' : '');
  div.innerHTML = `<span class="icon">${icon}</span> ${name}`;
  div.onclick = () => selectFile(name);
  list.appendChild(div);
  if (!files.includes(name)) files.push(name);
}

async function selectFile(path) {
  document.getElementById('currentFile').textContent = `~/${path}`;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  // 高亮选中
  const items = document.getElementById('fileList').querySelectorAll('.sidebar-item');
  items.forEach(el => { if (el.textContent.trim().includes(path)) el.classList.add('active'); });

  const frame = document.getElementById('canvasFrame');
  const empty = document.getElementById('contentArea');

  if (path === 'index.html' || path.endsWith('.html')) {
    frame.style.display = 'block';
    empty.style.display = 'none';
    frame.src = '/canvas/' + path;
    document.getElementById('fileInfo').textContent = `🔄 加载 ${path}`;
    frame.onload = () => {
      document.getElementById('fileInfo').textContent = '✅ 已加载';
    };
    frame.onerror = () => {
      document.getElementById('fileInfo').textContent = '⚠️ 加载失败';
    };
  } else {
    frame.style.display = 'none';
    empty.style.display = 'flex';
  }
  updateStatus();
}

// ── 操作 ──
function refreshCanvas() {
  const frame = document.getElementById('canvasFrame');
  if (frame.style.display !== 'none') {
    frame.src = frame.src; // 强制刷新
    document.getElementById('fileInfo').textContent = '🔄 刷新中...';
  }
  loadFileList();
}

function toggleA2UI() {
  const panel = document.getElementById('a2uiPanel');
  panel.classList.toggle('open');
}

function toggleTheme() {
  const frame = document.getElementById('canvasFrame');
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  frame.classList.toggle('dark');
}

function openInNewTab() {
  const path = document.getElementById('currentFile').textContent.replace('~/', '');
  window.open('/canvas/' + path, '_blank');
}

async function pushA2UI() {
  try {
    const json = JSON.parse(document.getElementById('a2uiInput').value);
    const resp = await fetch('/a2ui/push', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(json),
    });
    const result = await resp.json();
    if (result.ok) {
      document.getElementById('fileInfo').textContent = `✅ A2UI 已推送 (${result.components} 组件)`;
      selectFile(`_a2ui_${result.surface}.html`);
    }
  } catch(e) {
    document.getElementById('fileInfo').textContent = '⚠️ JSON 格式错误: ' + e.message;
  }
}

function exampleA2UI() {
  return JSON.stringify({
    "surface": "main",
    "components": [
      {"id": "title", "component": {"Text": {"text": "🦞 Tea Agent Canvas", "usageHint": "h1"}}},
      {"id": "subtitle", "component": {"Text": {"text": "Agent 驱动的可视化工作区", "usageHint": "h2"}}},
      {"id": "desc", "component": {"Text": {"text": "这个界面由 Agent 通过 A2UI 协议动态渲染。Agent 可以用 JSON 描述 UI 组件，Canvas 自动渲染为网页。"}}}
    ]
  }, null, 2);
}

function updateStatus() {
  document.getElementById('statusRight').textContent =
    `WS: ${WS && WS.readyState === 1 ? '🟢' : '🔴'} | 文件: ${files.length}`;
}

// ── 启动 ──
connectWS();
</script>
</body>
</html>
