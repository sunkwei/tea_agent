[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tea_agent"
version = "0.5.0"
description = "A self-evolving AI agent with dynamic toolkit management, OCR vision, and GUI automation"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    {name = "sunkw", email = "sunkwei@gmail.com" }
]

classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
]

dependencies = [
    "openai>=1.0.0",
    "markdown>=3.4.0",
    "tkinterweb>=3.10",
    "pyautogui>=0.9.0",
    "easyocr>=1.7.0",
    "mss>=9.0.0",
    "Pillow>=10.0.0",
    "requests>=2.30.0",
    "beautifulsoup4>=4.12.0",
]

[project.urls]
Homepage = "https://github.com/sunkwei/tea_agent"

[project.scripts]
tea_agent = "tea_agent.main_db_gui:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["tea_agent*"]
