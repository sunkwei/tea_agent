<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tea Agent GUI2</title>
<style>
/* ── Reset & Base ── */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;overflow:hidden}

/* ── Layout ── */
#app{display:flex;height:100vh}
#sidebar{width:260px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;flex-shrink:0}
.sb-hdr{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #30363d}
.sb-hdr h1{font-size:22px}.sb-hdr span{font-size:16px;font-weight:600;color:#58a6ff}
.sb-acts{padding:12px}
#main{flex:1;display:flex;flex-direction:column;min-width:0}

/* ── Toolbar ── */
#tb{padding:8px 16px;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
#tt{flex:1;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Buttons ── */
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.btn-p{background:#58a6ff;color:#fff;width:100%}.btn-p:hover{background:#1f6feb}
.btn-s{padding:4px 10px;font-size:12px}
.btn-g{background:transparent;color:#8b949e}.btn-g:hover{background:#21262d;color:#c9d1d9}
.btn-sm{padding:4px 8px;font-size:11px}
.bs{padding:10px 20px;background:#58a6ff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600}
.bs:disabled{opacity:.4}

/* ── Topic List ── */
.tl{flex:1;overflow-y:auto;padding:8px}
.ti{padding:8px 12px;border-radius:6px;cursor:pointer;margin-bottom:2px;font-size:13px;color:#8b949e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .15s}
.ti:hover{background:#21262d;color:#c9d1d9}
.ti.act{background:#1f6feb;color:#fff}

/* ── Messages ── */
#msgs{flex:1;overflow-y:auto;padding:16px}
.w{text-align:center;padding:60px 20px;color:#8b949e}
.w h2{font-size:20px;color:#c9d1d9}
.m{margin-bottom:16px;max-width:85%}
.m.u{margin-left:auto}.m.a{margin-right:auto}
.ml{font-size:11px;color:#8b949e;margin-bottom:4px}
.mb{padding:10px 14px;border-radius:8px;line-height:1.6;font-size:14px;white-space:pre-wrap}
.m.u .mb{background:#1f6feb;color:#fff;border-bottom-right-radius:2px}
.m.a .mb{background:#21262d;border-bottom-left-radius:2px}

/* ── Input Area ── */
#ia{padding:12px 16px;border-top:1px solid #30363d;display:flex;gap:8px;align-items:flex-end}
#ci{flex:1;padding:10px 12px;border:1px solid #30363d;border-radius:8px;background:#161b22;color:#c9d1d9;font-size:14px;resize:none;outline:none;font-family:inherit;min-height:44px;max-height:120px}
#ci:focus{border-color:#58a6ff}

/* ── Modal ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000}
.mc{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;min-width:420px;max-width:640px;max-height:80vh;overflow-y:auto}
.mc h3{margin-bottom:16px;font-size:16px}
.mc h4{margin:14px 0 8px;font-size:13px;border-bottom:1px solid #30363d;padding-bottom:6px}
.mc input,.mc textarea,.mc select{width:100%;padding:8px;border:1px solid #30363d;border-radius:6px;background:#21262d;color:#c9d1d9;font-size:13px;margin-bottom:8px;outline:none;font-family:inherit}
.mc input:focus,.mc textarea:focus,.mc select:focus{border-color:#58a6ff}
.mc select option{background:#161b22;color:#c9d1d9}
.mc label{display:block;font-size:12px;color:#8b949e;margin-bottom:2px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.mi{padding:8px 0;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.mi .tx{flex:1;font-size:13px;line-height:1.4;word-break:break-all}
.mi .tx s{color:#8b949e;display:block;font-size:11px;margin-top:2px}
.mi .btn{flex-shrink:0}

/* ── Form ── */
.form-group{margin-bottom:6px}
.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1}
.form-inline{display:flex;align-items:center;gap:6px;margin:6px 0}
.form-inline label{display:inline;font-size:12px;cursor:pointer}
.form-inline input[type="checkbox"]{width:auto;margin:0}
.status-msg{padding:8px 12px;border-radius:6px;font-size:13px;margin:8px 0}
.status-msg.info{background:rgba(88,166,255,.12);color:#58a6ff}
.status-msg.success{background:rgba(63,185,80,.12);color:#3fb950}
.status-msg.error{background:rgba(248,81,73,.12);color:#f85149}
</style>
</head>
<body>
<div id="app">
<aside id="sidebar">
<div class="sb-hdr"><h1>☕</h1><span>Tea Agent</span></div>
<div class="sb-acts"><button class="btn btn-p" onclick="newTopic()">+ 新对话</button></div>
<div id="tl" class="tl"></div>
</aside>
<main id="main">
<div id="tb">
<span id="tt">欢迎使用 Tea Agent</span>
<button class="btn btn-g btn-s" onclick="showSearch()">🔍 搜索</button>
<button class="btn btn-g btn-s" onclick="showMemory()">🧠 记忆</button>
<button class="btn btn-g btn-s" onclick="showConfig()">⚙ 配置</button>
<button class="btn btn-g btn-s" onclick="showScheduler()">📋 任务</button>
<button class="btn btn-g btn-s" onclick="showExport()">📄 导出</button>
<button class="btn btn-g btn-s" onclick="clearChat()">🗑 清空</button>
</div>
<div id="msgs">
<div class="w">
<h2>☕ Tea Agent GUI</h2>
<p>开始对话，或使用上方工具栏管理记忆、配置、任务等</p>
</div>
</div>
<div id="ia">
<textarea id="ci" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" onkeydown='if(event.key==="Enter"&&!event.shiftKey){event.preventDefault();send()}' oninput="document.getElementById('bs').disabled=!this.value.trim()"></textarea>
<button id="bs" class="bs" disabled onclick="send()">发送</button>
</div>
</main>
</div>

<!-- ═══════════ Search Modal ═══════════ -->
<div id="modal-search" class="mo" style="display:none"><div class="mc">
<h3>🔍 搜索对话与记忆</h3>
<input id="sq" placeholder="输入搜索关键词..." onkeydown="if(event.key=='Enter')doSearch()">
<div id="sr"></div>
<div class="ma">
<button class="btn btn-g" onclick="hide('modal-search')">取消</button>
<button class="btn btn-p" onclick="doSearch()" style="width:auto">搜索</button>
</div>
</div></div>

<!-- ═══════════ Memory Modal ═══════════ -->
<div id="modal-memory" class="mo" style="display:none"><div class="mc">
<h3>🧠 记忆管理</h3>
<textarea id="mc" rows="2" placeholder="输入新记忆内容..."></textarea>
<button class="btn btn-p" onclick="addMemory()" style="width:auto;margin-bottom:8px">+ 添加记忆</button>
<div id="ml"></div>
<div class="ma">
<button class="btn btn-g" onclick="hide('modal-memory')">关闭</button>
</div>
</div></div>

<!-- ═══════════ Config Modal ═══════════ -->
<div id="modal-config" class="mo" style="display:none"><div class="mc" style="max-width:580px">
<h3>⚙ 模型配置</h3>
<div id="config-status" class="status-msg" style="display:none"></div>

<div class="form-group">
<label>配置文件</label>
<select id="config-select" onchange="onConfigSelect(this.value)"><option value="">— 加载中 —</option></select>
</div>

<h4 style="color:#58a6ff">📌 主模型 (Main Model)</h4>
<div class="form-group"><label>模型名称</label><input type="text" id="cfg-model-name" placeholder="如: deepseek-chat"></div>
<div class="form-group"><label>API URL</label><input type="url" id="cfg-api-url" placeholder="如: https://api.deepseek.com"></div>
<div class="form-group"><label>API Key</label><input type="password" id="cfg-api-key" placeholder="sk-..."></div>
<div class="form-row">
<div class="form-group"><label>Temperature</label><input type="number" id="cfg-temperature" placeholder="0.7" step="0.01" min="0" max="2"></div>
<div class="form-group"><label>Max Tokens</label><input type="number" id="cfg-max-tokens" placeholder="4096" min="1"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Top-P</label><input type="number" id="cfg-top-p" placeholder="0.9" step="0.01" min="0" max="1"></div>
<div class="form-group"><label>Max Context Tokens</label><input type="number" id="cfg-max-context" placeholder="0=不限制" min="0"></div>
</div>
<div class="form-inline">
<label><input type="checkbox" id="cfg-vision"> 👁️ 支持视觉</label>
<label><input type="checkbox" id="cfg-reasoning" checked> 🧠 支持推理</label>
</div>

<h4 style="color:#3fb950">🔄 便宜模型 (Cheap Model) — 可选</h4>
<div class="form-group"><label>模型名称</label><input type="text" id="cfg-cheap-name" placeholder="如: deepseek-v4-flash"></div>
<div class="form-group"><label>API URL</label><input type="url" id="cfg-cheap-url" placeholder="如: https://api.deepseek.com"></div>
<div class="form-group"><label>API Key (不填则用主模型 Key)</label><input type="password" id="cfg-cheap-key" placeholder="sk-..."></div>
<div class="form-row">
<div class="form-group"><label>Temperature</label><input type="number" id="cfg-cheap-temp" placeholder="0.7" step="0.01" min="0" max="2"></div>
<div class="form-group"><label>Max Tokens</label><input type="number" id="cfg-cheap-max-tokens" placeholder="4096" min="1"></div>
</div>
<div class="form-inline">
<label><input type="checkbox" id="cfg-cheap-vision"> 👁️ 支持视觉</label>
<label><input type="checkbox" id="cfg-cheap-reasoning" checked> 🧠 支持推理</label>
</div>

<h4 style="color:#d29900">⚡ 运行时参数</h4>
<div class="form-row">
<div class="form-group"><label>Max Iterations</label><input type="number" id="cfg-max-iter" placeholder="50" min="1"></div>
<div class="form-group"><label>Keep Turns</label><input type="number" id="cfg-keep-turns" placeholder="5" min="1"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Max History</label><input type="number" id="cfg-max-history" placeholder="10" min="1"></div>
<div class="form-group"><label>Max Tool Output</label><input type="number" id="cfg-max-tool-out" placeholder="131072" min="1024"></div>
</div>
<div class="form-inline">
<label><input type="checkbox" id="cfg-thinking" checked> 🧠 Enable Thinking</label>
</div>

<div class="ma">
<button class="btn btn-g" onclick="showNewConfigModal()">➕ 新增配置</button>
<button class="btn btn-g" onclick="hide('modal-config')">取消</button>
<button class="btn btn-p" onclick="applyConfig()" style="width:auto">✅ 应用配置</button>
</div>
</div></div>

<!-- ═══════════ New Config Modal ═══════════ -->
<div id="modal-new-config" class="mo" style="display:none"><div class="mc" style="max-width:500px">
<h3>➕ 新增配置文件</h3>
<div class="form-group"><label>文件名</label><input type="text" id="nc-filename" placeholder="如: config_custom" value="config_custom"></div>
<h4 style="color:#58a6ff">主模型</h4>
<div class="form-group"><label>模型名称</label><input type="text" id="nc-main-name" placeholder="如: gpt-4o"></div>
<div class="form-group"><label>API URL</label><input type="url" id="nc-main-url" placeholder="https://api.openai.com/v1"></div>
<div class="form-group"><label>API Key</label><input type="password" id="nc-main-key" placeholder="sk-..."></div>
<h4 style="color:#3fb950">便宜模型 — 可选</h4>
<div class="form-group"><label>模型名称</label><input type="text" id="nc-cheap-name" placeholder="如: deepseek-v4-flash"></div>
<div class="form-group"><label>API URL</label><input type="url" id="nc-cheap-url" placeholder="https://api.deepseek.com"></div>
<div class="form-group"><label>API Key</label><input type="password" id="nc-cheap-key" placeholder="不填则使用主模型Key"></div>
<div id="nc-status" class="status-msg" style="display:none"></div>
<div class="ma">
<button class="btn btn-g" onclick="hide('modal-new-config')">取消</button>
<button class="btn btn-p" onclick="saveNewConfig()" style="width:auto">💾 保存并应用</button>
</div>
</div></div>

<!-- ═══════════ Scheduler Modal ═══════════ -->
<div id="modal-scheduler" class="mo" style="display:none"><div class="mc">
<h3>📋 定时任务</h3>
<div style="display:flex;gap:8px;flex-wrap:wrap">
<input id="tn" placeholder="任务名称" style="flex:2">
<input id="tc" placeholder="命令行" style="flex:3">
<input id="ts" placeholder="调度 (daily:08:00)" style="flex:2">
</div>
<button class="btn btn-p" onclick="addTask()" style="width:auto;margin-bottom:8px">+ 添加任务</button>
<div id="tkl"></div>
<div class="ma">
<button class="btn btn-g" onclick="hide('modal-scheduler')">关闭</button>
</div>
</div></div>

<!-- ═══════════ Export Modal ═══════════ -->
<div id="modal-export" class="mo" style="display:none"><div class="mc">
<h3>📄 导出 PDF</h3>
<p style="font-size:13px;color:#8b949e;margin-bottom:12px">导出当前话题为 PDF 文件</p>
<div id="er"></div>
<div class="ma">
<button class="btn btn-g" onclick="hide('modal-export')">取消</button>
<button class="btn btn-p" onclick="doExport()" style="width:auto">导出</button>
</div>
</div></div>

<script>
(function(){
'use strict';

// ── State ──
let tid = null;
let streaming = false;

// ── DOM helpers ──
const $ = id => document.getElementById(id);
const esc = t => { if(!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };
const show = id => { $(id).style.display = 'flex'; };
const hide = id => { $(id).style.display = 'none'; };

// ── Toast ──
function toast(msg, type) {
    let el = $('toast');
    if (!el) {
        el = document.createElement('div');
        el.id = 'toast';
        el.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:8px;font-size:13px;z-index:9999;transition:all .3s;opacity:0;pointer-events:none';
        document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.background = type === 'error' ? 'rgba(248,81,73,.9)' : type === 'success' ? 'rgba(63,185,80,.9)' : 'rgba(88,166,255,.9)';
    el.style.color = '#fff';
    el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

// ══════════════════════════════════════════════════
//  Chat / Messages
// ══════════════════════════════════════════════════

function addMsg(role, content) {
    let w = document.querySelector('.w');
    if (w) w.remove();
    let div = document.createElement('div');
    div.className = 'm ' + (role === 'user' ? 'u' : 'a');
    div.innerHTML = '<div class="ml">' + (role === 'user' ? '你' : 'Tea Agent') + '</div><div class="mb">' + esc(content) + '</div>';
    $('msgs').appendChild(div);
    scrollBottom();
    return div.querySelector('.mb');
}

function scrollBottom() {
    const m = $('msgs');
    setTimeout(() => { m.scrollTop = m.scrollHeight; }, 50);
}

// ── Send Message ──
window.send = async function() {
    let inp = $('ci'), msg = inp.value.trim();
    if (!msg || streaming) return;
    inp.value = '';
    $('bs').disabled = true;
    addMsg('user', msg);
    let ab = addMsg('ai', '...');
    streaming = true;
    try {
        let p = { messages: [{ role: 'user', content: msg }], stream: true };
        if (tid) p.topic_id = tid;
        let r = await fetch('/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(p)
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        let rd = r.body.getReader(), dec = new TextDecoder(), buf = '', fullText = '';
        while (true) {
            let { done, value } = await rd.read();
            if (done) break;
            buf += dec.decode(value, { stream: true });
            let lines = buf.split('\n');
            for (let i = 0; i < lines.length - 1; i++) {
                let l = lines[i].trim();
                if (!l.startsWith('data: ')) continue;
                try {
                    let d = JSON.parse(l.slice(6));
                    if (d.choices && d.choices[0] && d.choices[0].delta && d.choices[0].delta.content) {
                        fullText += d.choices[0].delta.content;
                        ab.innerHTML = esc(fullText);
                    } else if (d.type === 'tool_call' && d.tool_calls) {
                        // tool call info could be shown here
                    }
                } catch(e) { /* skip parse errors */ }
            }
            buf = lines[lines.length - 1];
            scrollBottom();
        }
        if (!fullText) ab.innerHTML = '(无响应)';
    } catch(e) {
        ab.innerHTML = '<span style="color:#ff5555">Error: ' + esc(e.message) + '</span>';
    } finally {
        streaming = false;
        $('bs').disabled = false;
        refreshTopics();
    }
};

// ══════════════════════════════════════════════════
//  Topics / Sessions
// ══════════════════════════════════════════════════

async function refreshTopics() {
    try {
        let r = await fetch('/api/sessions');
        if (!r.ok) return;
        let d = await r.json();
        if (!d.data) return;
        $('tl').innerHTML = d.data.map(t => {
            let title = t.title || t.id.slice(0, 8);
            let cls = 'ti' + (t.id === tid ? ' act' : '');
            return '<div class="' + cls + '" onclick="openTopic(\'' + t.id + '\',\'' + esc(title) + '\')">' + esc(title) + '</div>';
        }).join('');
    } catch(e) {}
}

window.openTopic = async function(id, title) {
    tid = id;
    $('tt').textContent = title || id.slice(0, 8);
    refreshTopics();
    try {
        let r = await fetch('/api/topic/' + id + '/conversations?limit=50');
        if (!r.ok) return;
        let d = await r.json();
        if (!d.data) return;
        $('msgs').innerHTML = '';
        d.data.forEach(c => {
            if (c.user_msg) addMsg('user', c.user_msg);
            if (c.ai_msg) addMsg('ai', c.ai_msg);
        });
    } catch(e) {}
};

window.newTopic = function() {
    tid = null;
    $('tt').textContent = '新对话';
    $('msgs').innerHTML = '<div class="w"><h2>☕ Tea Agent GUI</h2><p>开始对话，或使用上方工具栏管理记忆、配置、任务等</p></div>';
    refreshTopics();
};

window.clearChat = function() {
    if (streaming) { toast('正在发送消息，请稍候...', 'error'); return; }
    $('msgs').innerHTML = '<div class="w"><h2>☕ Tea Agent GUI</h2><p>开始对话，或使用上方工具栏管理记忆、配置、任务等</p></div>';
};

// ══════════════════════════════════════════════════
//  Search
// ══════════════════════════════════════════════════

window.showSearch = function() {
    show('modal-search');
    $('sq').value = '';
    $('sr').innerHTML = '';
    setTimeout(() => $('sq').focus(), 100);
};

window.doSearch = async function() {
    const q = $('sq').value.trim();
    if (!q) return;
    const el = $('sr');
    el.innerHTML = '<div style="color:#8b949e;font-size:13px;padding:8px 0">搜索中...</div>';
    try {
        const r = await fetch('/api/search?q=' + encodeURIComponent(q) + '&limit=20');
        if (!r.ok) throw new Error(r.status);
        const d = await r.json();
        const results = d.data || {};
        let h = '';
        if (results.conversations && results.conversations.length) {
            h += '<div style="font-size:13px;font-weight:600;margin:8px 0 4px">对话结果</div>';
            results.conversations.forEach(c => {
                h += '<div class="mi"><div class="tx">' + esc(c.user_msg || c.ai_msg || '') + '<s>' + (c.stamp || '') + '</s></div></div>';
            });
        }
        if (results.memories && results.memories.length) {
            h += '<div style="font-size:13px;font-weight:600;margin:8px 0 4px">记忆结果</div>';
            results.memories.forEach(m => {
                h += '<div class="mi"><div class="tx">' + esc(m.content || '') + '<s>' + esc(m.category || '') + '</s></div></div>';
            });
        }
        if (!h) h = '<div style="color:#8b949e;font-size:13px;padding:8px 0">没有结果</div>';
        el.innerHTML = h;
    } catch(e) {
        el.innerHTML = '<div style="color:#ff5555;font-size:13px;padding:8px 0">Error: ' + esc(e.message) + '</div>';
    }
};

// ══════════════════════════════════════════════════
//  Memory Management
// ══════════════════════════════════════════════════

window.showMemory = async function() {
    show('modal-memory');
    $('mc').value = '';
    await refreshMemoryList();
};

window.addMemory = async function() {
    const c = $('mc').value.trim();
    if (!c) return;
    try {
        let r = await fetch('/api/memory', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: c })
        });
        let d = await r.json();
        if (d.ok) {
            $('mc').value = '';
            await refreshMemoryList();
            toast('✓ 记忆已添加', 'success');
        } else {
            toast('✗ ' + (d.error || '添加失败'), 'error');
        }
    } catch(e) {
        toast('Error: ' + e.message, 'error');
    }
};

async function refreshMemoryList() {
    try {
        let r = await fetch('/api/memory');
        if (!r.ok) throw new Error(r.status);
        let d = await r.json();
        let el = $('ml');
        if (d.data && d.data.length) {
            el.innerHTML = d.data.map(m =>
                '<div class="mi"><div class="tx">' + esc(m.content || '') + ' <s>' + esc(m.category || '') + '</s></div>' +
                '<button class="btn btn-g btn-sm" onclick="deleteMemory(\'' + m.id + '\')">删除</button></div>'
            ).join('');
        } else {
            el.innerHTML = '<div style="color:#8b949e;font-size:13px;padding:8px 0">暂无记忆</div>';
        }
    } catch(e) {
        $('ml').innerHTML = '<div style="color:#ff5555;font-size:13px;padding:8px 0">加载失败: ' + esc(e.message) + '</div>';
    }
}

window.deleteMemory = async function(id) {
    try {
        let r = await fetch('/api/memory/' + encodeURIComponent(id), { method: 'DELETE' });
        let d = await r.json();
        if (d.ok) {
            await refreshMemoryList();
            toast('🗑 记忆已删除', 'success');
        }
    } catch(e) {
        toast('删除失败: ' + e.message, 'error');
    }
};

// ══════════════════════════════════════════════════

window.showConfig = async function() {
    show('modal-config');
    $('config-status').style.display = 'none';
    try {
        // Load current config
        let r1 = await fetch('/api/config');
        if (r1.ok) {
            let d = await r1.json();
            let cfg = d.data || d;
            $('cfg-model-name').value = cfg.model || '';
            $('cfg-api-url').value = cfg.api_url || '';
            $('cfg-api-key').value = '';
            $('cfg-temperature').value = cfg.temperature != null ? cfg.temperature : '';
            $('cfg-max-tokens').value = cfg.max_tokens != null ? cfg.max_tokens : '';
            $('cfg-top-p').value = cfg.top_p != null ? cfg.top_p : '';
            $('cfg-max-context').value = cfg.max_context_tokens != null ? cfg.max_context_tokens : '';
            let opts = cfg.options || {};
            $('cfg-vision').checked = !!opts.supports_vision;
            $('cfg-reasoning').checked = opts.supports_reasoning !== false;
            // Cheap model
            if (cfg.cheap_model) {
                $('cfg-cheap-name').value = cfg.cheap_model.model || '';
                $('cfg-cheap-url').value = cfg.cheap_model.api_url || '';
                $('cfg-cheap-key').value = '';
                $('cfg-cheap-temp').value = cfg.cheap_model.temperature != null ? cfg.cheap_model.temperature : '';
                $('cfg-cheap-max-tokens').value = cfg.cheap_model.max_tokens != null ? cfg.cheap_model.max_tokens : '';
                let copts = cfg.cheap_model.options || {};
                $('cfg-cheap-vision').checked = !!copts.supports_vision;
                $('cfg-cheap-reasoning').checked = copts.supports_reasoning !== false;
            }
            // Runtime params
            $('cfg-max-iter').value = cfg.max_iterations != null ? cfg.max_iterations : '';
            $('cfg-keep-turns').value = cfg.keep_turns != null ? cfg.keep_turns : '';
            $('cfg-max-history').value = cfg.max_history != null ? cfg.max_history : '';
            $('cfg-max-tool-out').value = cfg.max_tool_output != null ? cfg.max_tool_output : '';
            $('cfg-thinking').checked = cfg.enable_thinking !== false;
        }
        // Load config file list
        let r2 = await fetch('/api/configs');
        if (r2.ok) {
            let d2 = await r2.json();
            let sel = $('config-select');
            let configs = d2.data || d2.configs || [];
            sel.innerHTML = '<option value="">-- 请选择配置 --</option>';
            configs.forEach(c => {
                let model = c.main_model ? c.main_model.model_name : '';
                let selAttr = '';
                if (d2.active_config_path && c.path === d2.active_config_path) {
                    selAttr = ' selected';
                }
                sel.innerHTML += '<option value="' + esc(c.path) + '"' + selAttr + '>' + esc(c.filename) + ' — ' + esc(model) + '</option>';
            });
        }
    } catch(e) {
        showStatus('config-status', '加载配置失败: ' + e.message, 'error');
    }
};

function onConfigSelect(path) {
    if (!path) return;
    // 从已加载的列表中找到对应配置，填充表单
    fetch('/api/configs').then(r => r.json()).then(d2 => {
        let configs = d2.data || d2.configs || [];
        let cfg = configs.find(c => c.path === path);
        if (cfg && cfg.main_model) {
            $('cfg-model-name').value = cfg.main_model.model_name || '';
            $('cfg-api-url').value = cfg.main_model.api_url || '';
            if (cfg.cheap_model) {
                $('cfg-cheap-name').value = cfg.cheap_model.model_name || '';
                $('cfg-cheap-url').value = cfg.cheap_model.api_url || '';
            }
        }
    }).catch(() => {});
}

window.applyConfig = async function() {
    const apiKey = $('cfg-api-key').value.trim();
    const apiUrl = $('cfg-api-url').value.trim();
    const modelName = $('cfg-model-name').value.trim();
    const cheapKey = $('cfg-cheap-key').value.trim();
    const cheapUrl = $('cfg-cheap-url').value.trim();
    const cheapModel = $('cfg-cheap-model-name') ? $('cfg-cheap-model-name').value.trim() : '';

    if (!apiUrl || !modelName) {
        showStatus('config-status', '请填写完整的主模型信息（API URL 和 模型名称）', 'error');
        return;
    }

    function nv(id) { let v = $(id).value.trim(); return v ? Number(v) : null; }

    showStatus('config-status', '正在应用配置...', 'info');

    try {
        // 1. Apply model settings
        const body = {};
        if (apiKey) body.api_key = apiKey;
        body.api_url = apiUrl;
        body.model_name = modelName;
        body.temperature = nv('cfg-temperature');
        body.max_tokens = nv('cfg-max-tokens');
        body.top_p = nv('cfg-top-p');
        body.max_context_tokens = nv('cfg-max-context');
        body.options = {
            supports_vision: $('cfg-vision').checked,
            supports_reasoning: $('cfg-reasoning').checked,
        };

        // Cheap model
        const cheapName = $('cfg-cheap-name').value.trim();
        const cheapUrl2 = $('cfg-cheap-url').value.trim();
        if (cheapName && cheapUrl2) {
            if (cheapKey) body.cheap_api_key = cheapKey;
            body.cheap_api_url = cheapUrl2;
            body.cheap_model_name = cheapName;
            body.cheap_temperature = nv('cfg-cheap-temp');
            body.cheap_max_tokens = nv('cfg-cheap-max-tokens');
            body.cheap_options = {
                supports_vision: $('cfg-cheap-vision').checked,
                supports_reasoning: $('cfg-cheap-reasoning').checked,
            };
        }

        let r = await fetch('/api/model', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        let d = await r.json();
        if (!d.ok) {
            showStatus('config-status', '应用失败: ' + (d.error || d.errors?.join(', ') || '未知错误'), 'error');
            return;
        }

        // 2. Save runtime params
        let updates = {};
        let mi = nv('cfg-max-iter'); if (mi != null) updates.max_iterations = mi;
        let kt = nv('cfg-keep-turns'); if (kt != null) updates.keep_turns = kt;
        let mh = nv('cfg-max-history'); if (mh != null) updates.max_history = mh;
        let mt = nv('cfg-max-tool-out'); if (mt != null) updates.max_tool_output = mt;
        updates.enable_thinking = $('cfg-thinking').checked;

        if (Object.keys(updates).length > 0) {
            await fetch('/api/config', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updates),
            });
        }

        showStatus('config-status', '✅ 配置已应用: ' + d.model, 'success');
        setTimeout(() => hide('modal-config'), 1500);
    } catch(e) {
        showStatus('config-status', '应用失败: ' + e.message, 'error');
    }
};

function showStatus(id, msg, type) {
    let el = $(id);
    if (!el) return;
    el.style.display = 'block';
    el.className = 'status-msg ' + (type || 'info');
    el.textContent = msg;
}

// ── New Config ──
window.showNewConfigModal = function() {
    hide('modal-config');
    show('modal-new-config');
    $('nc-status').style.display = 'none';
};

window.saveNewConfig = async function() {
    const filename = $('nc-filename').value.trim();
    const mainName = $('nc-main-name').value.trim();
    const mainUrl = $('nc-main-url').value.trim();
    const mainKey = $('nc-main-key').value.trim();
    const cheapName = $('nc-cheap-name').value.trim();
    const cheapUrl = $('nc-cheap-url').value.trim();
    const cheapKey = $('nc-cheap-key').value.trim();

    if (!filename || !mainName || !mainUrl || !mainKey) {
        $('nc-status').style.display = 'block';
        $('nc-status').className = 'status-msg error';
        $('nc-status').textContent = '请填写完整信息（文件名、主模型名称、URL 和 Key）';
        return;
    }

    $('nc-status').style.display = 'block';
    $('nc-status').className = 'status-msg info';
    $('nc-status').textContent = '保存中...';

    try {
        const body = { filename, main_model_name: mainName, main_api_url: mainUrl, main_api_key: mainKey };
        if (cheapName && cheapUrl) {
            body.cheap_model_name = cheapName;
            body.cheap_api_url = cheapUrl;
            if (cheapKey) body.cheap_api_key = cheapKey;
        }
        let r = await fetch('/api/config/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        let d = await r.json();
        if (d.ok) {
            $('nc-status').className = 'status-msg success';
            $('nc-status').textContent = '✓ 配置已保存并应用: ' + d.filename;
            setTimeout(() => {
                hide('modal-new-config');
                hide('modal-config');
            }, 1500);
        } else {
            $('nc-status').className = 'status-msg error';
            $('nc-status').textContent = d.error || (d.errors || []).join(', ') || '保存失败';
        }
    } catch(e) {
        $('nc-status').className = 'status-msg error';
        $('nc-status').textContent = 'Error: ' + e.message;
    }
};

window.showScheduler = async function() {
    show('modal-scheduler');
    $('tn').value = '';
    $('tc').value = '';
    $('ts').value = '';
    await refreshTaskList();
};

window.addTask = async function() {
    const name = $('tn').value.trim();
    const cmd = $('tc').value.trim();
    const sched = $('ts').value.trim();
    if (!name || !cmd) { toast('请填写任务名称和命令', 'error'); return; }
    try {
        let r = await fetch('/v1/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, command: cmd, schedule: sched || 'once' })
        });
        let d = await r.json();
        if (d.id) {
            $('tn').value = ''; $('tc').value = ''; $('ts').value = '';
            await refreshTaskList();
            toast('✓ 任务已添加', 'success');
        }
    } catch(e) {
        toast('Error: ' + e.message, 'error');
    }
};

async function refreshTaskList() {
    try {
        let r = await fetch('/v1/tasks');
        if (!r.ok) throw new Error(r.status);
        let d = await r.json();
        let el = $('tkl');
        let items = d.data || [];
        if (items.length) {
            el.innerHTML = items.map(t =>
                '<div class="mi"><div class="tx">' + esc(t.name || '') + ' <s>' + esc(t.schedule || '') + '</s></div>' +
                '<button class="btn btn-g btn-sm" onclick="deleteTask(\'' + t.id + '\')">删除</button></div>'
            ).join('');
        } else {
            el.innerHTML = '<div style="color:#8b949e;font-size:13px;padding:8px 0">暂无任务</div>';
        }
    } catch(e) {
        $('tkl').innerHTML = '<div style="color:#ff5555;font-size:13px;padding:8px 0">加载失败</div>';
    }
}

window.deleteTask = async function(id) {
    try {
        await fetch('/v1/tasks/' + encodeURIComponent(id), { method: 'DELETE' });
        await refreshTaskList();
        toast('🗑 任务已删除', 'success');
    } catch(e) {}
};

window.doExport = async function() {

        $('er').innerHTML = '<div style="color:#ff5555;font-size:13px;padding:8px 0">请先选择一个话题</div>';
        return;
    }
    const el = $('er');

    try {
        let r = await fetch('/v1/export/pdf', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ topic_id: tid })
        });
        let d = await r.json();
        if (d.success) {
            el.innerHTML = '<div style="color:#3fb950;font-size:13px;padding:8px 0">✓ 已导出: ' + esc(d.path || '') + '</div>';

        }
    } catch(e) {
        el.innerHTML = '<div style="color:#ff5555;font-size:13px;padding:8px 0">Error: ' + esc(e.message) + '</div>';
    }
};
