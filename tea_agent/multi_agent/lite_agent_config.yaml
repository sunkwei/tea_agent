# LiteAgent 示例配置文件
# 将此文件复制为自定义配置，按需修改

# ── 主模型配置（必填） ──
main_model:
  api_key: "YOUR_API_KEY_HERE"       # API 密钥
  api_url: "http://localhost:11434/v1"  # OpenAI-compatible API 地址
  model_name: "qwen3.6"              # 模型名称
  temperature: 0.7
  max_tokens: 4096
  # options:                         # 模型额外参数（可选）
  #   num_gpu: 15

# ── 行为配置 ──
max_iterations: 15                    # 最大工具调用轮数（防止死循环）
keep_turns: 5                         # 保留最近 N 轮对话历史
max_tool_output: 32768                # 单次工具输出最大字节数

# ── 系统提示词（可选） ──
# system_prompt: "你是一个代码审查专家..."

# ── 工具过滤（可选） ──
# tool_whitelist:                     # 仅允许这些工具
#   - toolkit_file
#   - toolkit_exec
# tool_blacklist:                     # 禁止这些工具
#   - toolkit_mgrt
#   - toolkit_self_evolve
