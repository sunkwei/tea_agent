<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>工具调用美化 DEMO</title>
<style>
/* Copy the relevant styles from style.css */
:root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
    --text: #c9d1d9; --text-dim: #8b949e; --border: #30363d;
    --primary: #58a6ff; --green: #3fb950; --red: #f85149;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);padding:30px;}
h2{color:var(--primary);margin:20px 0 10px;}
.demo-row{display:flex;gap:20px;flex-wrap:wrap;}

/* ── OLD style ── */
.tool-call-old {
    margin: 4px 0; font-size: 12px; color: var(--green);
    padding: 4px 10px; background: rgba(63,185,80,.08);
    border-radius: 6px; display: inline-block;
}

/* ── NEW styles ── */
.tool-call-container {
    margin: 8px 0 12px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--surface);
    overflow: hidden; animation: toolFadeIn .3s ease;
}
@keyframes toolFadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
}
.tool-call-summary {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; cursor: pointer; font-size: 13px;
    font-weight: 600; color: var(--text-dim); user-select: none;
    transition: background .15s;
}
.tool-call-summary:hover { background: var(--surface2); }
.tool-call-summary .icon { font-size: 16px; }
.tool-call-summary .badge {
    margin-left: auto; font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 10px;
    background: var(--surface2); color: var(--text-dim);
}
.tool-call-item {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 16px; font-size: 13px;
    border-top: 1px solid var(--border);
    transition: all .2s;
}
.tool-call-item:first-of-type { border-top: none; }
.tool-call-item .status-icon { width: 20px; text-align: center; flex-shrink: 0; }
.tool-call-item .tool-name { font-family:"SF Mono","Cascadia Code",monospace; font-size:12px; }
.tool-call-item .tool-name code { background:rgba(88,166,255,.08); color:var(--primary); padding:1px 6px; border-radius:3px; }
.tool-call-item.running { color: var(--primary); }
.tool-call-item.done { color: var(--text-dim); }
.tool-call-item.done .status-icon { color: var(--green); }
.tool-spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border); border-top: 2px solid var(--primary);
    border-radius: 50%; animation: toolSpin .6s linear infinite;
    vertical-align: middle;
}
@keyframes toolSpin { to { transform: rotate(360deg); } }

/* Tool params (shown below tool name) -- matching app.js */
.tool-params { margin: 2px 0 0 30px; }
.tool-param-row { display: flex; gap: 6px; padding: 1px 0; font-size: 11px; font-family: "SF Mono","Cascadia Code","Consolas",monospace; line-height: 1.4; }
.param-key { color: var(--text-dim); flex-shrink: 0; }
.param-key::after { content: ':'; }
.param-val code { background: rgba(88,166,255,.06); color: var(--text-dim); padding: 1px 5px; border-radius: 3px; font-size: 10px; word-break: break-all; }

/* Tool result */
.tool-result { margin: 2px 0 0 26px; display: flex; gap: 4px; align-items: flex-start; font-size: 11px; }
.result-label { color: var(--green); flex-shrink: 0; font-weight: bold; }
.result-val code { background: rgba(63,185,80,.06); color: var(--green); padding: 1px 5px; border-radius: 3px; font-size: 10px; word-break: break-all; }

/* done state */
.tool-call-container.done {
    border-color: rgba(63,185,80,.3);
}
.tool-call-container.done .tool-call-summary {
    color: var(--green);
}

/* Bubble mock */
.bubble {
    max-width:700px; background:var(--surface);
    border:1px solid var(--border); border-radius:12px;
    padding:16px;
}
.msg-label { font-size:12px; color:var(--text-dim); margin-bottom:8px; font-weight:600; }

.btn-group { margin: 20px 0; display:flex; gap:10px; }
.btn {
    padding:8px 16px; border:1px solid var(--border); border-radius:6px;
    background:var(--surface); color:var(--text); cursor:pointer;
    font-size:13px; transition:all .15s;
}
.btn:hover { background: var(--surface2); border-color: var(--primary); }
.btn-active { background: var(--primary-dim); border-color: var(--primary); color:#fff; }
</style>
</head>
<body>
<h1>🔧 工具调用美化 — 新旧对比</h1>

<div class="btn-group">
    <button class="btn btn-active" onclick="show('old')">旧版</button>
    <button class="btn" onclick="show('new')">新版</button>
</div>

<div id="demo-old" class="bubble">
    <div class="msg-label">Tea Agent</div>
    <p style="margin-bottom:12px;font-size:14px;">让我来帮你做这件事...</p>
    <span class="tool-call-old">🔧 toolkit_search</span>
    <span class="tool-call-old">🔧 toolkit_file</span>
    <span class="tool-call-old">🔧 toolkit_exec</span>
    <span class="tool-call-old">🔧 toolkit_diff_edit</span>
    <p style="margin-top:12px;font-size:14px;">完成！下面是结果...</p>
</div>

<div id="demo-new" class="bubble" style="display:none;">
    <div class="msg-label">Tea Agent</div>
    <p style="margin-bottom:12px;font-size:14px;">让我来帮你做这件事...</p>
    <!-- Completed container -->
    <details class="tool-call-container done" open>
        <summary class="tool-call-summary">
            <span class="icon">✅</span>
            <span class="label">工具调用完成</span>
            <span class="badge">4/4</span>
        </summary>
        <div class="tool-call-item done"><span class="status-icon">✅</span><span class="tool-name"><code>toolkit_search</code></span></div>
        <div class="tool-call-item done"><span class="status-icon">✅</span><span class="tool-name"><code>toolkit_file</code></span></div>
        <div class="tool-call-item done"><span class="status-icon">✅</span><span class="tool-name"><code>toolkit_exec</code></span></div>
        <div class="tool-call-item done"><span class="status-icon">✅</span><span class="tool-name"><code>toolkit_diff_edit</code></span></div>
    </details>
    <p style="font-size:14px;">完成！下面是结果...</p>
</div>

<hr style="border:1px solid var(--border);margin:30px 0;">

<h2>🎬 动画演示（模拟实时工具调用）</h2>
<div class="btn-group">
    <button class="btn" id="btn-animate" onclick="animateTools()">▶ 播放模拟</button>
    <button class="btn" onclick="resetAnim()">↺ 重置</button>
</div>

<div id="demo-animate" class="bubble">
    <div class="msg-label">Tea Agent</div>
    <p style="margin-bottom:12px;font-size:14px;">正在处理你的请求...</p>
    <!-- Dynamic container will be inserted here -->
    <div id="animate-content"></div>
    <p id="animate-result" style="font-size:14px;display:none;">✅ 所有工具执行完毕！</p>
</div>

<script>
function show(type) {
    document.querySelectorAll('.btn-group:first-of-type .btn').forEach(b => b.classList.remove('btn-active'));
    document.getElementById('demo-old').style.display = type === 'old' ? '' : 'none';
    document.getElementById('demo-new').style.display = type === 'new' ? '' : 'none';
}

const tools = [
    { name: 'toolkit_search', args: 'query: Python async tutorial, max_results: 10', result: '{"status":"ok","results":12}' },
    { name: 'toolkit_file', args: 'action: read, filename: /home/user/config.yaml', result: 'name: app\nversion: 1.0.0\ndebug: true' },
    { name: 'toolkit_exec', args: 'app: python, args: ["-c","print(42)"]', result: '42\n' },
    { name: 'toolkit_diff_edit', args: 'file_path: main.py, old_text: return 0, new_text: return 42', result: '{"ok":true,"summary":"1 file changed"}' }
];
let animIndex = 0;
let animContainer = null, animList = null, animSummary = null, animDone = 0;

function resetAnim() {
    animIndex = 0; animDone = 0;
    animContainer = null; animList = null; animSummary = null;
    document.getElementById('animate-content').innerHTML = '';
    document.getElementById('animate-result').style.display = 'none';
    document.getElementById('btn-animate').disabled = false;
}

function animateTools() {
    const btn = document.getElementById('btn-animate');
    btn.disabled = true;
    resetAnim();
    const content = document.getElementById('animate-content');

    // Start tools one by one
    tools.forEach((t, i) => {
        setTimeout(() => {
            // tool_start
            if (!animContainer) {
                animContainer = document.createElement('details');
                animContainer.className = 'tool-call-container';
                animContainer.open = true;
                animSummary = document.createElement('summary');
                animSummary.className = 'tool-call-summary';
                animSummary.innerHTML = '<span class="icon">🔧</span><span class="label">工具调用中...</span><span class="badge" id="anim-badge">0/' + tools.length + '</span>';
                animContainer.appendChild(animSummary);
                animList = document.createElement('div');
                animContainer.appendChild(animList);
                content.appendChild(animContainer);
            }
            const item = document.createElement('div');
            item.className = 'tool-call-item running';
            item.id = 'tool-' + i;
            item.innerHTML = '<span class="status-icon"><span class="tool-spinner"></span></span><span class="tool-name"><code>' + t.name + '</code></span>';
            animList.appendChild(item);
            document.getElementById('anim-badge').textContent = (i) + '/' + tools.length;

            // tool_args after tiny delay
            setTimeout(() => {
                const it = document.getElementById('tool-' + i);
                if (!it || !t.args) return;
                const pd = document.createElement('div');
                pd.className = 'tool-params';
                const pairs = t.args.split(', ');
                for (const pair of pairs) {
                    const col = pair.indexOf(': ');
                    const row = document.createElement('div');
                    row.className = 'tool-param-row';
                    if (col > 0) {
                        row.innerHTML = '<span class="param-key">' + pair.slice(0, col) + '</span><span class="param-val"><code>' + pair.slice(col + 2) + '</code></span>';
                    } else {
                        row.innerHTML = '<span class="param-val"><code>' + pair + '</code></span>';
                    }
                    pd.appendChild(row);
                }
                it.appendChild(pd);
            }, 100);

            // tool_done after delay
            setTimeout(() => {
                const doneItem = document.getElementById('tool-' + i);
                if (doneItem) {
                    doneItem.classList.remove('running');
                    doneItem.classList.add('done');
                    doneItem.querySelector('.status-icon').innerHTML = '✅';
                    // Add result
                    if (t.result) {
                        const rd = document.createElement('div');
                        rd.className = 'tool-result';
                        rd.innerHTML = '<span class="result-label">↳</span><span class="result-val"><code>' + t.result + '</code></span>';
                        doneItem.appendChild(rd);
                    }
                }
                const badge = document.getElementById('anim-badge');
                if (badge) badge.textContent = (i+1) + '/' + tools.length;

                // All done?
                if (i === tools.length - 1) {
                    animContainer.classList.add('done');
                    animContainer.open = false;
                    animSummary.querySelector('.icon').textContent = '✅';
                    animSummary.querySelector('.label').textContent = '工具调用完成';
                    document.getElementById('animate-result').style.display = '';
                    btn.disabled = false;
                }
            }, 600 + Math.random() * 500);
        }, i * 800);
    });
}
</script>
</body>
</html>
